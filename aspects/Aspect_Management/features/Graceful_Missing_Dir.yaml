created_at: '2026-03-07'
description: The list-aspects command now gracefully handles a missing aspects/ directory
  by returning empty output instead of crashing with a FileNotFoundError. This makes
  the command consistent with list-shortcomings and list-all which already have this
  guard behavior.
tags:
- list-aspects
- error-handling
- robustness
title: Graceful Handling Of Missing Aspects Directory
