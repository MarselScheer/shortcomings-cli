created_at: '2026-03-08'
description: 'The list-aspects, list-shortcomings, and list-all commands now gracefully
  handle missing directories and malformed content. This includes: (1) Returning empty
  output instead of crashing when the aspects/ directory is missing; (2) Using a safe_load_yaml
  helper that handles yaml.YAMLError gracefully; (3) Skipping directories without
  aspect.yaml (incomplete/malformed aspects). The implementation is centralized in
  a _get_aspects_dir() helper in engine.py.'
tags:
